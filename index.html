<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>THE HUNT FOR MORE | SQUATWOLF</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --black: #000000;
    --off-white: #f7f5f2;
    --aurora-red: #B93A32;
    --dark-grey: #1a1a1a;
    --mid-grey: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  header {
    padding: 2rem 1.5rem 0.8rem;
    text-align: center;
    width: 100%;
    max-width: 500px;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.15em;
    color: var(--off-white);
    line-height: 1;
  }

  header h1 span { color: var(--aurora-red); }

  .subtitle {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mid-grey);
    margin-top: 0.5rem;
  }

  .progress-bar {
    width: 88%;
    max-width: 400px;
    height: 3px;
    background: var(--dark-grey);
    border-radius: 2px;
    margin: 1rem auto 0.4rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--aurora-red);
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    width: 0%;
  }

  .counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: var(--mid-grey);
    text-align: center;
  }

  .counter strong {
    color: var(--aurora-red);
    font-size: 1.3rem;
  }

  /* JUST FOUND BANNER */
  .found-banner {
    display: none;
    width: 88%;
    max-width: 400px;
    margin: 1rem auto 0;
    padding: 0.8rem 1rem;
    background: rgba(185, 58, 50, 0.12);
    border: 1px solid rgba(185, 58, 50, 0.3);
    border-radius: 8px;
    text-align: center;
    animation: bannerIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .found-banner.show { display: block; }

  .found-banner .found-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--mid-grey);
    text-transform: uppercase;
  }

  .found-banner .found-piece {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--aurora-red);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  @keyframes bannerIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* GRID */
  .grid-container {
    width: 88%;
    max-width: 400px;
    margin: 1rem auto;
  }

  .grid-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 50%;
  }

  .puzzle-grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 3px;
    border-radius: 8px;
    overflow: hidden;
  }

  .piece {
    position: relative;
    background: var(--dark-grey);
    overflow: hidden;
  }

  .piece.locked::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--dark-grey);
    z-index: 2;
  }

  .piece.locked::after {
    content: '?';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: #2a2a2a;
    z-index: 3;
  }

  .piece.unlocked::before,
  .piece.unlocked::after { display: none; }

  .piece img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .piece.just-revealed {
    animation: revealPiece 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes revealPiece {
    0% { transform: scale(1.3) rotate(5deg); opacity: 0; }
    50% { transform: scale(1.05) rotate(-1deg); opacity: 0.8; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .piece.just-revealed img {
    animation: imgReveal 0.8s ease forwards;
  }

  @keyframes imgReveal {
    0% { filter: brightness(3) contrast(0); }
    100% { filter: brightness(1) contrast(1); }
  }

  .pulse-ring {
    position: absolute;
    inset: 0;
    border: 2px solid var(--aurora-red);
    border-radius: 2px;
    z-index: 5;
    animation: pulseRing 1s ease-out forwards;
    pointer-events: none;
  }

  @keyframes pulseRing {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.15); }
  }

  /* HINT */
  .hint {
    text-align: center;
    margin: 0.8rem auto;
    width: 88%;
    max-width: 400px;
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 0.1em;
    line-height: 1.6;
  }

  /* COMPLETION */
  .completed-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .completed-overlay.show {
    display: flex;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .completed-overlay h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.15em;
    color: var(--aurora-red);
    animation: slideUp 0.6s ease 0.3s both;
  }

  .completed-overlay .tagline {
    font-size: 0.7rem;
    color: var(--mid-grey);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.3rem;
    animation: slideUp 0.6s ease 0.45s both;
  }

  .completed-overlay .full-image {
    width: 85%;
    max-width: 400px;
    margin: 1.5rem 0;
    border-radius: 8px;
    animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  .completed-overlay .cta {
    margin-top: 1rem;
    padding: 1rem 2.5rem;
    background: var(--aurora-red);
    color: var(--off-white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    animation: slideUp 0.6s ease 0.8s both;
    transition: transform 0.15s ease;
  }

  .completed-overlay .cta:active { transform: scale(0.95); }

  .completed-overlay .booth-msg {
    margin-top: 1rem;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: #444;
    text-transform: uppercase;
    animation: slideUp 0.6s ease 1s both;
  }

  .prize-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    animation: slideUp 0.6s ease 0.8s both;
  }

  .prize-info.loading { opacity: 0.4; }

  .prize-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.12em;
    color: var(--off-white);
    text-align: center;
    margin-top: 0.5rem;
  }

  .prize-headline.win { color: var(--aurora-red); }

  .prize-sub {
    margin-top: 0.6rem;
    font-size: 0.7rem;
    line-height: 1.5;
    letter-spacing: 0.08em;
    color: var(--mid-grey);
    text-align: center;
    text-transform: uppercase;
    padding: 0 0.5rem;
  }

  .prize-badge {
    margin-top: 1.2rem;
    padding: 0.9rem 2rem;
    background: var(--aurora-red);
    color: var(--off-white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    border-radius: 6px;
    text-align: center;
  }

  .prize-badge.sold-out {
    background: transparent;
    border: 1px solid #333;
    color: #888;
  }

  .prize-footnote {
    margin-top: 1rem;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: #444;
    text-transform: uppercase;
    text-align: center;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .footer-brand {
    padding: 1.5rem 1rem 2rem;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--off-white);
    margin-top: auto;
  }

  .footer-brand .x { color: var(--aurora-red); margin: 0 0.25em; }
</style>
</head>
<body>

<div class="grain"></div>

<header>
  <h1>THE HUNT FOR <span>MORE</span></h1>
  <div class="subtitle">Scan QR codes around the venue · Reveal the image</div>

  <img class="full-image" id="fullImage" src="" alt="SQUATWOLF">
  <div id="prizeInfo" class="prize-info"></div>
</div>

// ===== PERSISTENT STORAGE (multiple fallbacks for iOS) =====
function readFromLocalStorage() {
  try { return localStorage.getItem('sw_hunt') || ''; } catch(e) { return ''; }
}
function writeToLocalStorage(val) {
  try { localStorage.setItem('sw_hunt', val); } catch(e) {}
}
function readFromCookie() {
  try {
    const match = document.cookie.match(/(^| )sw_hunt=([^;]+)/);
    return match ? match[2] : '';
  } catch(e) { return ''; }
}
function writeToCookie(val) {
  try {
    const d = new Date(); d.setTime(d.getTime() + 7*24*60*60*1000);
    document.cookie = 'sw_hunt=' + val + ';expires=' + d.toUTCString() + ';path=/;SameSite=None;Secure';
  } catch(e) {}
}
function readFromIDB() {
  return new Promise(function(resolve) {
    try {
      const req = indexedDB.open('sw_hunt_db', 1);
      req.onupgradeneeded = function() { req.result.createObjectStore('pieces'); };
      req.onsuccess = function() {
        const tx = req.result.transaction('pieces', 'readonly');
        const get = tx.objectStore('pieces').get('unlocked');
        get.onsuccess = function() { resolve(get.result || ''); };
        get.onerror = function() { resolve(''); };
      };
      req.onerror = function() { resolve(''); };
    } catch(e) { resolve(''); }
  });
}
function writeToIDB(val) {
  try {
    const req = indexedDB.open('sw_hunt_db', 1);
    req.onupgradeneeded = function() { req.result.createObjectStore('pieces'); };
    req.onsuccess = function() {
      const tx = req.result.transaction('pieces', 'readwrite');
      tx.objectStore('pieces').put(val, 'unlocked');
    };
  } catch(e) {}
}

function parseSet(raw) {
  if (!raw) return new Set();
  return new Set(raw.split(',').map(Number).filter(function(n) { return n >= 1 && n <= 9; }));
}

function mergeSets() {
  var sets = [];
  for (var i = 0; i < arguments.length; i++) sets.push(arguments[i]);
  var merged = new Set();
  sets.forEach(function(s) { s.forEach(function(v) { merged.add(v); }); });
  return merged;
}

async function getUnlocked() {
  var ls = parseSet(readFromLocalStorage());
  var ck = parseSet(readFromCookie());
  var idb = parseSet(await readFromIDB());
  var merged = mergeSets(ls, ck, idb);
  // Re-save to all stores so they stay in sync
  if (merged.size > 0) saveUnlocked(merged);
  return merged;
}

function saveUnlocked(set) {
  var val = Array.from(set).join(',');
  writeToLocalStorage(val);
  writeToCookie(val);
  writeToIDB(val);
}

// ===== RENDER =====
async function render(justUnlocked) {
  const grid = document.getElementById('puzzleGrid');
  const unlocked = await getUnlocked();
  grid.innerHTML = '';

  for (let i = 1; i <= 9; i++) {
    const div = document.createElement('div');
    div.className = 'piece';

    if (unlocked.has(i)) {
      div.classList.add('unlocked');
      if (i === justUnlocked) {
        div.classList.add('just-revealed');
        const ring = document.createElement('div');
        ring.className = 'pulse-ring';
        div.appendChild(ring);
      }
      const img = document.createElement('img');
      img.src = IMAGE_DATA[i];
      img.alt = 'Piece ' + i;
      div.appendChild(img);
    } else {
      div.classList.add('locked');
    }

    grid.appendChild(div);
  }

  // Update counter & progress
  document.getElementById('countNum').textContent = unlocked.size;
  document.getElementById('progressFill').style.width = ((unlocked.size / 9) * 100) + '%';

  // Update hint
  const hint = document.getElementById('hintText');
  if (unlocked.size === 0) {
    hint.textContent = 'Scan QR codes hidden around the venue to reveal pieces of the puzzle.';
  } else if (unlocked.size < 9) {
    const remaining = 9 - unlocked.size;
    hint.textContent = remaining + ' piece' + (remaining > 1 ? 's' : '') + ' remaining. Keep hunting.';
  } else {
    hint.style.display = 'none';
  }

  // Show found banner
  if (justUnlocked) {
    const banner = document.getElementById('foundBanner');
    document.getElementById('foundPieceNum').textContent = 'PIECE ' + justUnlocked + ' OF 9';
    banner.classList.add('show');
    setTimeout(() => banner.classList.remove('show'), 3000);
  }

  // Check completion
  if (unlocked.size === 9) {
    setTimeout(() => {
      document.getElementById('fullImage').src = FULL_IMAGE;
      document.getElementById('completedOverlay').classList.add('show');
      renderPrizeInfo();
    }, 1500);
  }
}

// ===== PRIZE STATUS =====
// Source of truth: prize-status.json in repo. Staff edit it from GitHub
// when each of the 5 giveaways is handed out. Cache-busted so edits show up fast.
async function fetchPrizeStatus() {
  // Test-mode override via URL (?preview=claimed or ?preview=available)
  // lets you see both screens without consuming a real prize slot.
  const preview = new URLSearchParams(window.location.search).get('preview');
  if (preview === 'claimed') return { claimed: 5, total: 5, _preview: true };
  if (preview === 'available') return { claimed: 0, total: 5, _preview: true };

  try {
    const res = await fetch('prize-status.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    return {
      claimed: Number(data.claimed) || 0,
      total: Number(data.total) || 5
    };
  } catch (e) {
    // Fail open: if the file can't be fetched, assume prizes are still
    // available — booth staff are the final gate anyway.
    return { claimed: 0, total: 5, _fallback: true };
  }
}

async function renderPrizeInfo() {
  const box = document.getElementById('prizeInfo');
  if (!box) return;
  box.classList.add('loading');
  box.innerHTML = '';

  const status = await fetchPrizeStatus();
  const remaining = Math.max(0, status.total - status.claimed);
  const soldOut = remaining <= 0;

  box.classList.remove('loading');

  if (soldOut) {
    box.innerHTML =
      '<div class="prize-headline">Prizes claimed</div>' +
      '<div class="prize-sub">Thank you for participating &mdash; all ' + status.total +
      ' SQUATWOLF giveaways have already been won.</div>' +
      '<div class="prize-badge sold-out">Hunt complete</div>' +
      '<div class="prize-footnote">SQUATWOLF &times; ZIGCHAIN</div>' +
      (status._preview ? '<div class="prize-footnote">Preview mode</div>' : '');
  } else {
    box.innerHTML =
      '<div class="prize-headline win">You\'re in the running</div>' +
      '<div class="prize-sub">First ' + status.total + ' people to show this screen at the ' +
      'SQUATWOLF booth win a giveaway.</div>' +
      '<div class="prize-badge">Head to the booth</div>' +
      '<div class="prize-footnote">Show this screen &middot; Staff will verify</div>' +
      (status._preview ? '<div class="prize-footnote">Preview mode</div>' : '');
  }
}

// ===== URL PARAM HANDLING =====
async function checkParams() {
  const params = new URLSearchParams(window.location.search);
  const piece = parseInt(params.get('p'));

  // Short-circuit if all prizes are already claimed: skip the puzzle
  // entirely and show the "claimed" message right away. Any QR scan
  // — whether it's a new visitor or someone returning mid-hunt —
  // lands directly on the prize-claimed screen.
  const status = await fetchPrizeStatus();
  if (status.claimed >= status.total) {
    showSoldOut();
    if (window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
    return;
  }

  if (piece >= 1 && piece <= 9) {
    const unlocked = await getUnlocked();
    const isNew = !unlocked.has(piece);
    unlocked.add(piece);
    saveUnlocked(unlocked);

    // Clean URL without reloading (removes ?p=X so refreshing won't re-trigger)
    if (window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }

    await render(isNew ? piece : null);
  } else {
    await render();
  }
}

// When sold out, hide the puzzle UI and show the prize-claimed overlay
// directly. Bypasses the 9-scan flow so no one's wasting time hunting
// pieces for prizes that no longer exist.
function showSoldOut() {
  // Hide everything above the overlay so the page reads as a single
  // dedicated "thanks, prizes claimed" screen instead of the puzzle.
  document.querySelectorAll(
    'header, .progress-bar, .counter, .grid-container, .hint, .footer-brand, .found-banner'
  ).forEach((el) => { el.style.display = 'none'; });

  const overlay = document.getElementById('completedOverlay');
  // Clear the puzzle title — sold-out state isn't a "puzzle complete" moment
  const h2 = overlay.querySelector('h2');
  const tagline = overlay.querySelector('.tagline');
  const fullImg = overlay.querySelector('.full-image');
  if (h2) h2.textContent = 'Hunt closed';
  if (tagline) tagline.textContent = 'All prizes have been claimed';
  if (fullImg) fullImg.style.display = 'none';

  overlay.classList.add('show');
  renderPrizeInfo();
}

// Init
checkParams();
</script>
